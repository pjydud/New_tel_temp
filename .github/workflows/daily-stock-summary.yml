name: Daily Stock Summary

on:
  schedule:
    # 23:10 UTC = 08:10 KST
    - cron: "10 23 * * *"
  workflow_dispatch:

jobs:
  send-stock-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send stock summary to Telegram
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_WATCHLIST: ${{ vars.STOCK_WATCHLIST || 'KOSPI,KOSDAQ,삼성전자,SK하이닉스,NVIDIA,AMD,TSLA,BTC' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: python send_stock_summary.py
