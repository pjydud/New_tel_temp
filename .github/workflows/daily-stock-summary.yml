name: Daily Stock Summary

on:
  schedule:
    # 00:10 UTC = 09:10 KST
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-stock-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send stock summary to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_TOP_N: ${{ vars.STOCK_TOP_N || '5' }}
          STOCK_LOOKBACK_DAYS: ${{ vars.STOCK_LOOKBACK_DAYS || '7' }}
          STOCK_RUN_TIME_LABEL: "09:10"
        run: python send_stock_summary.py

      - name: Commit volume snapshot
        run: |
          if [ -n "$(git status --porcelain data/volume_snapshots.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/volume_snapshots.json
            git commit -m "Update 09:10 stock volume snapshot"
            git push
          else
            echo "No snapshot changes to commit."
          fi
